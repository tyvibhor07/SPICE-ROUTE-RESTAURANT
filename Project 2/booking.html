<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book a Table - Spice Route Restaurant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-image: url('images/spice-route-bg.png'); background-size: cover; background-position: center;">
  <section class="page">
    <h1>Book a Table</h1>
    <p>Reserve your seat and enjoy our delicious pure‑veg dishes!</p>

    <form>
      <label>Name:</label><br>
      <input type="text" name="name" required><br><br>
      <label>Email:</label><br>
      <input type="email" name="email" required><br><br>
      <label>Phone:</label><br>
      <input type="tel" name="phone" required><br><br>
      <label>Date:</label><br>
      <input type="date" name="date" required><br><br>
      <label>Time:</label><br>
      <input type="time" name="time" required><br><br>
      <label>Guests:</label><br>
      <input type="number" name="guests" min="1" max="20" required><br><br>
      <button type="submit">Confirm Booking</button>
    </form>
  </section>

  <footer>
    <p>© 2026 Spice Route Restaurant | Pure Veg Delight</p>
  </footer>
</body>
</html>
